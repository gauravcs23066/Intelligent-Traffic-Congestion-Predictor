<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Traffic Predictor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>NexusAI Lite</h1>
            <p>A simple traffic congestion predictor.</p>
        </header>
        
        <main>
            <div class="card form-card">
                <h2>Predict Traffic</h2>
                <form id="predictForm">
                    <div class="form-group">
                        <label for="hour">Time of Day (0-23)</label>
                        <input type="number" id="hour" name="hour" min="0" max="23" value="14" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="volume">Volume (Vehicles/hr)</label>
                        <input type="number" id="volume" name="volume" min="0" value="1200" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="speed">Average Speed (km/h)</label>
                        <input type="number" id="speed" name="speed" min="0" value="45" required>
                    </div>
                    
                    <button type="submit" id="submitBtn">Run Prediction</button>
                </form>
            </div>
            
            <div class="card result-card" id="resultCard" style="display: none;">
                <h2>Prediction Result</h2>
                
                <div class="status-box" id="statusBox">
                    <span id="resultStatus">Loading...</span>
                </div>
                
                <div class="probability-bars">
                    <div class="prob-row">
                        <span>Clear</span>
                        <div class="bar-container"><div class="bar" id="barClear" style="width: 0%"></div></div>
                        <span id="probClear">0%</span>
                    </div>
                    <div class="prob-row">
                        <span>Moderate</span>
                        <div class="bar-container"><div class="bar" id="barModerate" style="width: 0%"></div></div>
                        <span id="probModerate">0%</span>
                    </div>
                    <div class="prob-row">
                        <span>Congested</span>
                        <div class="bar-container"><div class="bar" id="barCongested" style="width: 0%"></div></div>
                        <span id="probCongested">0%</span>
                    </div>
                </div>
            </div>
            
            <div id="errorBox" class="error-box" style="display: none;"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
